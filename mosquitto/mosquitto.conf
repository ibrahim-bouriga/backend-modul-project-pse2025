# MQTT listener (TCP)
listener 1883

# WebSocket listener
listener 9001
protocol websockets

# Allow unauthenticated connections by default.
# Set to false and configure a password file to enable authentication.
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
