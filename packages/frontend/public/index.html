<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backend Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Welcome to backend project App</h1>
            <p class="subtitle">A minimal TypeScript application</p>
        </header>
        
        <main>
            <section class="features">
                <div class="feature-card">
                    <h2>Backend</h2>
                    <p>Express server with Node.js and TypeScript</p>
                    <button id="testBackend" class="btn">Test Backend Connection</button>
                    <div id="backendResponse" class="response"></div>
                </div>
            </section>
            
            <section class="actions">
                <div class="action-buttons">
                    <button class="btn btn-primary" onclick="window.location.reload()">Refresh Page</button>
                </div>
            </section>
        </main>
        
        <footer>
            <p>All functionality should be accessible from the home page</p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
