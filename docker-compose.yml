services:
  service-world-drive:
    profiles: ["prod"]
    build:
      context: ./packages/service-world-drive
      dockerfile: Dockerfile
    ports:
      - "${WORLD_DRIVE_PORT:-4003}:4003"
    environment:
      PORT: "4003"
      MQTT_BROKER_URL: "mqtt://broker.hivemq.com:1883"
      DATABASE_URL: "postgresql://${WORLD_DRIVE_POSTGRES_USER:-postgres}:${WORLD_DRIVE_POSTGRES_PASSWORD:-changeme}@postgres-world-drive:5432/${WORLD_DRIVE_POSTGRES_DB:-worlddrivedb}"
      ENABLE_SIMULATOR: "true"
    depends_on:
      postgres-world-drive:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    profiles: ["prod"]
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MQTT_BROKER_HOST: "${MQTT_BROKER_HOST:-localhost}"
        NEXT_PUBLIC_MQTT_BROKER_PORT: "${MQTT_PORT:-1883}"
        NEXT_PUBLIC_MQTT_WS_PORT: "${MQTT_WS_PORT:-9001}"
    image: nextjs-standalone-image
    container_name: nextjs-standalone-container
    environment:
      NODE_ENV: production
      PORT: "3000"
      WORLD_DRIVE_SERVICE_URL: "http://service-world-drive:4003"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

  ngrok:
    profiles: ["prod"]
    image: ngrok/ngrok:latest
    command: http frontend:3000
    environment:
      NGROK_AUTHTOKEN: 2KDet8l4E1nLaKmDAep74ytUUH6_NFiErNCC8TRaKVZS9iip
    depends_on:
      - frontend
    restart: unless-stopped

  mosquitto:
    profiles: ["dev", "prod"]
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  postgres-world-drive:
    profiles: ["dev", "prod"]
    image: postgres:16-alpine
    ports:
      - "${WORLD_DRIVE_POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: "${WORLD_DRIVE_POSTGRES_DB:-worlddrivedb}"
      POSTGRES_USER: "${WORLD_DRIVE_POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${WORLD_DRIVE_POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres_world_drive_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WORLD_DRIVE_POSTGRES_USER:-postgres} -d ${WORLD_DRIVE_POSTGRES_DB:-worlddrivedb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    profiles: ["dev", "prod"]
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_world_drive_data:
  mosquitto_data:
  mosquitto_log:
  minio_data:
