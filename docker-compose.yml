services:
  car_models:
    profiles: ["prod"]
    build:
      context: ./packages/car_models
      dockerfile: Dockerfile
    ports:
      - "${CAR_MODELS_PORT:-4001}:4001"
    environment:
      PORT: "4001"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pse2025}"
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: "http://localhost:${MINIO_PORT:-9000}"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    profiles: ["prod"]
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MQTT_BROKER_HOST: "${MQTT_BROKER_HOST:-localhost}"
        NEXT_PUBLIC_MQTT_BROKER_PORT: "${MQTT_PORT:-1883}"
        NEXT_PUBLIC_MQTT_WS_PORT: "${MQTT_WS_PORT:-9001}"
    image: nextjs-standalone-image
    container_name: nextjs-standalone-container
    environment:
      NODE_ENV: production
      PORT: "3000"
      CAR_MODELS_URL: "http://car_models:4001"
      NGROK_API_URL: "http://ngrok:4040"
      SERVICE_MYPSECARS_URL: "http://service-mypsecars:4004"
      MQTT_BROKER_HOST: mosquitto
      MQTT_WS_PORT: "${MQTT_WS_PORT:-9001}"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - car_models
      - service-mypsecars
    restart: unless-stopped

  ngrok:
    profiles: ["prod"]
    image: ngrok/ngrok:latest
    command: http frontend:3000
    environment:
      NGROK_AUTHTOKEN: "${NGROK_AUTHTOKEN}"
    ports:
      - "4040:4040"
    depends_on:
      - frontend
    restart: unless-stopped

  service-mypsecars:
    profiles: ["prod"]
    build:
      context: ./packages/service-mypsecars
      dockerfile: Dockerfile
    ports:
      - "${SERVICE_MYPSECARS_PORT:-4004}:4004"
    environment:
      PORT: "4004"
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "${MQTT_PORT:-1883}"
    depends_on:
      mosquitto:
        condition: service_started
    restart: unless-stopped

  mosquitto:
    profiles: ["dev", "prod"]
    image: eclipse-mosquitto:2
    ports:
      - "${MQTT_PORT:-1883}:1883"
      - "${MQTT_WS_PORT:-9001}:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  postgres:
    profiles: ["dev", "prod"]
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-pse2025}"
      POSTGRES_USER: "${POSTGRES_USER:-postgres}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-changeme}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-pse2025}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    profiles: ["dev", "prod"]
    image: minio/minio:latest
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9002}:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ROOT_USER:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_ROOT_PASSWORD:-minioadmin}"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  webshop:
    profiles: ["prod"]
    build:
      context: ./packages/webshop
      dockerfile: Dockerfile
    ports:
      - "${WEBSHOP_PORT:-4001}:4001"
    environment:
      PORT: "4001"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-pse2025}"
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: "${MQTT_PORT:-1883}"
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
  redis:
    profiles: ["dev", "prod"]
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  minio_data:
  redis_data:
